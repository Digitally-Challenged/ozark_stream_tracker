[build]
  command = "npm run build && cd netlify/functions && npm install"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[functions."turner-bend"]
  external_node_modules = ["cheerio"]

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/turner-bend/*"
  to = "/.netlify/functions/turner-bend/:splat"
  status = 200
  force = true

# SPA fallback - serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://mesonet.agron.iastate.edu https://www.wpc.ncep.noaa.gov https://unpkg.com; connect-src 'self' https://waterservices.usgs.gov https://api.water.noaa.gov https://mapservices.weather.noaa.gov https://mesonet.agron.iastate.edu"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
